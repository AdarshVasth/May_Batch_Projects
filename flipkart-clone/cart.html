<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Flipkart Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body {
            margin: 0px;
            width: 100%;
            padding: 0px;
        }

        .header {
            position: relative;
            width: 100%;
            background-color: #86b6e6;
            padding: 20px;
            margin: 0px;
        }

        .cart-content {
            margin-top: 20px;
            margin-left: 0px;
            padding: 50px;
            width: 100%;
        }

        .order-details {
            background-color: #f8f9fa;
            padding: 20px;
        }

        .order-summary {
            background-color: antiquewhite;
            padding: 20px;
        }

        .row-card-content {
            margin: 0px;
            padding: 0px;
            display: flex;
            gap: 20px;
        }
    </style>
</head>

<body>
    <div class="container-fluid header">
        <h1>Cart Page</h1>
        <p>This is where the products in your cart will be displayed.</p>
    </div>

    <div class="container-fluid cart-content">
        <div class="row row-card-content">
            <div class="col-md-6 order-details">
                <div class="card w-100 mb-6">
                    <div class="card-body">
                        <h5 class="card-title">Card title</h5>
                        <p class="card-text">With supporting text below as a natural lead-in to additional content.</p>
                        <a href="#" class="btn btn-primary">Button</a>
                    </div>
                </div>


            </div>

            <div class="col-md-4 order-summary">
                <h2>Order Summary</h2>
                <p>Summary of the order will be displayed here.</p>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
