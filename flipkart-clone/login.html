<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flipkart Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container-flex">
        <div class="row d-flex justify-content-center">
            <div class="col-md-6 d-flex align-items-center justify-content-center" style="background-color: #f8f9fa; margin-top: 200px">
                <div class="text-center">
                    <h1 class="mb-4">Welcome Back!</h1>
                    <p class="mb-4">Please login to your account to continue shopping.</p>
                    <form action="products.html">
                        <div class="mb-3">
                            <input type="tel" class="form-control" placeholder="Mobile Number" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Password" required>
                        </div>

                        <div class="mb-3">
                            <input type="submit" class="form-control" value="Login">
                        </div>
                    </form>
                </div>
            </div>

        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
