<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>We are learning about BOM</h1>
    <button onclick="redirectToGoogle()">Go to Google</button>

    <p id="para"></p>
    <script>
        //BOM - Browser Object Model
        console.log(window);
        console.log(window.location);
        function redirectToGoogle() {
            if(window.confirm ("Redirecting to Google")) {
                window.location.href = "https://www.google.com";
            }
        }

        let person = window.prompt("What is your name?");
        let para = document.getElementById("para");
        para.innerText = "Hello " + person + ", welcome to the world of JavaScript!";
    </script>
</body>
</html>
